name: 'Release'

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: 'Semantic Release'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure Git user
        run: |
          git config --global user.name "semautobot"
          git config --global user.email "semautobot@users.noreply.github.com"

      - name: Auto-generate documentation
        uses: tj-actions/auto-doc@b10ceedffd794ec29a8fa8700529f40c1b64a951 # v3.6.0

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          ci: true
          semantic_version: 24.2.7
          extra_plugins: |
            @semantic-release/git
            @semantic-release/changelog
            @semantic-release/github
            semantic-release-replace-plugin
        env:
          GIT_AUTHOR_NAME: semautobot
          GIT_AUTHOR_EMAIL: semautobot@users.noreply.github.com
          GIT_COMMITTER_NAME: semautobot
          GIT_COMMITTER_EMAIL: semautobot@users.noreply.github.com
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}